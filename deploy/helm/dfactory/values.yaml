replicaCount: 2

image:
  repository: ghcr.io/your-org/dfactory
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3210

ingress:
  enabled: true
  className: nginx
  host: dfactory.internal.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70

env:
  NODE_ENV: production
  DFACTORY_API_KEY: change-me
