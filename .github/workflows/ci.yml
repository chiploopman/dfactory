name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-matrix:
    name: quality / node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate publish governance
        run: pnpm release:check-governance

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:quality

      - name: Test
        run: pnpm test

  quality:
    name: quality
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - quality-matrix
    steps:
      # Keep one stable required check name while the Node-version matrix expands underneath it.
      - name: Enforce matrix success
        run: test "${{ needs.quality-matrix.result }}" = "success"

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docs CI
        run: pnpm docs:ci

  initializer:
    name: initializer / ${{ matrix.os }} / ${{ matrix.manager }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            manager: npm
          - os: ubuntu-latest
            manager: pnpm
          - os: macos-latest
            manager: npm
          - os: windows-latest
            manager: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify packaged initializer
        run: pnpm verify:initializer -- --manager ${{ matrix.manager }}

  packages:
    name: packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate publishable tarballs
        run: pnpm release:pack

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
