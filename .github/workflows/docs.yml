name: Docs

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - "scripts/docs/**"
      - "README.md"
      - "packages/**/README.md"
      - "examples/**/README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "scripts/docs/**"
      - "README.md"
      - "packages/**/README.md"
      - "examples/**/README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docs CI checks
        run: pnpm docs:ci
