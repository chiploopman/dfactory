name: Feature request
description: Suggest an improvement to the DFactory platform or package suite.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, API, or workflow you want to add or improve.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include examples, constraints, or related packages if useful.
